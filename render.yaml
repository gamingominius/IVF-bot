services:
  - type: web
    name: discord-bot
    runtime: node
    buildCommand: npm install discord.js@13 @discordjs/rest discord-api-types express
    startCommand: node bot.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DISCORD_TOKEN
        sync: false
      - key: GUILD_ID
        sync: false
